<html>
<head>

<style>

body{

}

/* tombol awalnya hilang */
#btn{

    display:none;

    margin-top:40px;

    background-color: palevioletred;
    color:white;

<body>

<div id="typing"></div>

<button id="btn"
onclick="window.location.href='index (2).html'">

Click Here!!

</button>

<script>

const text = `Dia nih keren bngt leadership nya oke bngt, pubspeak nya mantap, pede nya apalagi, cantik juga, minus nya kurang waras aja memang. wkwkwkwk, kalau ada yg jahatin ko blg yh, terbang nnti aku dri jawa ke kepri. SMA nnti reach all your dreams yaa dir? Honestly it's really weird to mention SMA in our conversation cause i always though we still have one or two years again in jhs.. PASTI BISAAA KOK, my prays, wishes and hopes will always be with you. OH IYAA, jaga kesehatan yaa! JANGAN KECAPEAN, jangan selalu nanggung semua nya sendiri cause u will have a good person around you! Bahagia terus yaa Anak Hebat 🤍.
`;

let index = 0;

function typing(){

    if(index < text.length){

        document.getElementById("typing").innerHTML += text.charAt(index);

        index++;

        setTimeout(typing, 40);

    }else{

        // tombol muncul
        document.getElementById("btn").style.display = "block";

    }

}

typing();

</script>
